services:
  mongodb:
    image: mongo:latest
    container_name: nexus-mongo
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backup:/backup
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexus_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secure_password_here}
    networks:
      - nexus-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always
    expose:
      - "5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      API_PORT: 7788
      MONGO_URI: mongodb://${MONGO_USER:-nexus_admin}:${MONGO_PASSWORD:-secure_password_here}@mongodb:27017/nexustech?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32chars_min}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: https://dev.xus.me
      FRONTEND_URL: https://dev.xus.me
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      ALLOWED_IMAGE_TYPES: ${ALLOWED_IMAGE_TYPES:-image/jpeg,image/png,image/webp,image/gif}
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexus-network

  frontend:
    image: nginx:alpine
    container_name: nexus-frontend
    restart: always
    ports:
      - "7788:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
