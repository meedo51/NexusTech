services:
  mongodb:
    image: mongo:latest
    container_name: nexus-mongo
    restart: always
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backup:/backup
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - nexus-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://localhost:27017 --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PORT: 7788
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/nexustech?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://dev.xus.me}
      FRONTEND_URL: ${FRONTEND_URL:-https://dev.xus.me}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: always
    ports:
      - "7788:80"
    environment:
      REACT_APP_API_URL: ${API_URL:-https://dev.xus.me/api}
      REACT_APP_WEBSITE_URL: ${WEBSITE_URL:-https://dev.xus.me}
      REACT_APP_ADMIN_URL: ${ADMIN_URL:-https://dev.xus.me/admin}
    depends_on:
      - backend
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nexus-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
